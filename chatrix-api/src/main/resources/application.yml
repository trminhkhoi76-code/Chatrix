# ========================
# Chatrix API - Application Configuration
# ========================

spring:
  application:
    name: chatrix-api

  # --- Database ---
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chatrix?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:faber_extract_root_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # --- JPA ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # --- Flyway migrations ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # --- Redis ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:FaberCompany2016}
      timeout: 5000ms

  # --- Multipart ---
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

# --- Server ---
server:
  port: ${API_PORT:8080}
  servlet:
    context-path: /

# --- JWT ---
chatrix:
  jwt:
    secret: ${JWT_SECRET:chatrix-default-secret-change-in-production-min32chars}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:3600000}       # 1 hour
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}   # 7 days
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    base-url: ${BASE_URL:http://localhost:8080}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# --- OpenAPI ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# --- Logging ---
logging:
  level:
    com.chatrix: DEBUG
    org.springframework.security: INFO
