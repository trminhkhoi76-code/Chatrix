# Development profile — uses H2 in-memory DB (no Postgres needed)
spring:
  datasource:
    url: jdbc:h2:mem:chatrixdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

chatrix:
  jwt:
    secret: chatrix-dev-secret-key-for-local-development-only!!
