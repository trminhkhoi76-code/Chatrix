# Development profile — uses local MySQL + Redis
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chatrix?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: root
    password: faber_extract_root_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379

chatrix:
  jwt:
    secret: chatrix-dev-secret-key-for-local-development-only!!
